services:

  django_core:
    build:
      context: .
      dockerfile: Dockerfile
    image: chronoshift-backend:latest
    container_name: chronoshift-django
    working_dir: /app/django_core
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,django-core
      - SIMULATOR_URL=http://fastapi-simulator:8002
      - AI_ENGINE_URL=http://flask-ai-engine:8003
      - AI_REMOTE_ENABLED=False
    networks:
      default:
        aliases:
          - django-core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/timelines/health/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  fastapi_simulator:
    image: chronoshift-backend:latest
    container_name: chronoshift-fastapi
    working_dir: /app/fastapi_simulator
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_URL=http://django-core:8000
      - AI_ENGINE_URL=http://flask-ai-engine:8003
      - AI_REMOTE_ENABLED=False
    networks:
      default:
        aliases:
          - fastapi-simulator
    depends_on:
      django_core:
        condition: service_healthy
      flask_ai_engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/simulate/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  flask_ai_engine:
    image: chronoshift-backend:latest
    container_name: chronoshift-ai
    working_dir: /app/flask_ai_engine
    command: gunicorn main:app --bind 0.0.0.0:8003
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_URL=http://django-core:8000
      - AI_REMOTE_ENABLED=False
    networks:
      default:
        aliases:
          - flask-ai-engine
    depends_on:
      django_core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/ai/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
